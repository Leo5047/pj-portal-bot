services:
  pjportalbot:
    build: .
    container_name: pjportalbot
    restart: unless-stopped
    environment:
      # --- Required ---
      pjportal_user:  "${PJPORTAL_USER}"
      pjportal_pwd:   "${PJPORTAL_PWD}"
      ajax_uid:       "${AJAX_UID}"
      ntfy_url_topic: "${NTFY_URL_TOPIC}"   # e.g. https://ntfy.example.com/pj-portal

      # --- Optional ---
      ntfy_token:     "${NTFY_TOKEN:-}"     # Bearer token, leave empty if topic is public
      pj_tag:         "${PJ_TAG:-Innere Medizin}"
      check_frequency_lower_limit: "${CHECK_LOWER:-180}"
      check_frequency_upper_limit: "${CHECK_UPPER:-420}"
      ntfy_click_url: "${NTFY_CLICK_URL:-https://www.pj-portal.de/index_uu.php?PAGE_ID=101}"

    volumes:
      # Named volume managed by Docker - no host paths in the repo,
      # data persists across container/stack restarts.
      - pjportalbot_data:/data

volumes:
  pjportalbot_data:
